name: TAYVORIQ Control Plane Smoke

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/tayvoriq-control-plane-smoke.yml"
      - ".github/workflows/tayvoriq-golden-path.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tayvoriq-control-plane-smoke
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Validate private repository token
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$PRIVATE_REPO_TOKEN" ]; then
            echo "Missing required secret: PRIVATE_REPO_TOKEN" >&2
            exit 2
          fi

      - name: Checkout private implementation
        uses: actions/checkout@v4
        with:
          repository: mojo72549-arch/shorts-agent-studio
          ref: feature/multi-platform-distribution-package
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: implementation
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: implementation/requirements.txt

      - name: Install validation dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          pip install -r implementation/requirements.txt pytest

      - name: Compile, preflight and full tests
        working-directory: implementation
        run: |
          set -euo pipefail
          mkdir -p out/control-plane
          python -m compileall -q tools
          python tools/tayvoriq_preflight_check.py --report-out out/control-plane/preflight.json
          pytest -q tests

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tayvoriq-control-plane-smoke-${{ github.run_id }}
          path: implementation/out/control-plane/**
          if-no-files-found: warn
          retention-days: 30
