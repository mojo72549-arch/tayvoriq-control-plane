name: Project Lumen 13.1.23 Media3 Streaming Player Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - '.github/workflows/lumen-media3-player-final.yml'
      - 'lumen-public-preview/apply-media3-player-fix.py'
      - 'lumen-public-preview/apply-poc-home-persistence-fix.py'
      - 'lumen-public-preview/apply-import-start-watchdog-fix.py'

permissions:
  contents: read

concurrency:
  group: project-lumen-13-1-23-media3-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Restore Project Lumen through v13.1.15
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview
          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          echo 'c3edf3920f500f707dab2c0d6370f028e2c5d1aabc823ea14451606c377c948a  /tmp/diagnostics.py' | sha256sum -c -
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview

      - name: Correct and apply resilient download patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lumen-public-preview/apply-resilient-download-fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'download_block + "    private static URL buildBrokenHttpsRedirectRecoveryUrl("',
              'download_block')
          text = text.replace(
              'share_block + "    private void clearDiagnosticLog() {"',
              'share_block')
          text = text.replace(
              "        '''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"",
              "        r'''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"")
          text = text.replace(
              "        '''            showDiagnostic(\n                    partialRecovery ?",
              "        r'''            showDiagnostic(\n                    partialRecovery ?")
          text = text.replace(
              "        '''                showDiagnostic(\"Senderliste bereit\"",
              "        r'''                showDiagnostic(\"Senderliste bereit\"")
          text = text.replace(
              "        '''                showDiagnostic(partialRecovery ?",
              "        r'''                showDiagnostic(partialRecovery ?")
          path.write_text(text, encoding='utf-8')
          PY
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview

      - name: Apply transport, persistence and player fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-http451-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-api-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-account-status-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-channel-adapter-crash-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-import-start-watchdog-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-poc-home-persistence-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-media3-player-fix.py project-lumen-preview

      - name: Verify v13.1.23 safety, UX and player gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          GRADLE=project-lumen-preview/app/build.gradle
          grep -q 'text("v13.1.23"' "$MAIN"
          grep -q 'private enum Screen { START, MEDIA, EPG, SOURCE, SETTINGS }' "$MAIN"
          grep -q 'Live-Fernsehen' "$MAIN"
          grep -q 'Programm (EPG)' "$MAIN"
          grep -q 'Filme & Mediathek' "$MAIN"
          grep -q 'Serien' "$MAIN"
          grep -q 'Code=RESTORE-OK' "$MAIN"
          grep -q 'storageWorker.execute(() ->' "$MAIN"
          grep -q 'IMPORT-WORKER-START-TIMEOUT' "$MAIN"
          grep -q 'private PlayerView playerView' "$MAIN"
          grep -q 'private ExoPlayer exoPlayer' "$MAIN"
          grep -q 'DefaultHttpDataSource.Factory' "$MAIN"
          grep -q 'setUserAgent("VLC/3.0.20 LibVLC/3.0.20")' "$MAIN"
          grep -q 'setAllowCrossProtocolRedirects(true)' "$MAIN"
          grep -q 'PLAY-MEDIA3-' "$MAIN"
          grep -q 'playbackHttpStatus' "$MAIN"
          grep -q 'playbackErrorCategory' "$MAIN"
          grep -q 'describeStreamEndpoint' "$MAIN"
          grep -q 'ProjectLumen/13.1.23 Android' "$MAIN"
          grep -q 'androidx.media3:media3-exoplayer:' "$GRADLE"
          grep -q 'androidx.media3:media3-exoplayer-hls:' "$GRADLE"
          grep -q 'androidx.media3:media3-exoplayer-dash:' "$GRADLE"
          grep -q 'androidx.media3:media3-exoplayer-rtsp:' "$GRADLE"
          grep -q 'androidx.media3:media3-ui:' "$GRADLE"
          grep -q 'versionCode 133300' "$GRADLE"
          grep -q "versionName '13.1.23-media3-player-preview'" "$GRADLE"
          if grep -q 'VideoView' "$MAIN"; then
            echo 'Legacy VideoView is still present' >&2
            exit 1
          fi
          if grep -q 'MediaController' "$MAIN"; then
            echo 'Legacy MediaController is still present' >&2
            exit 1
          fi
          if grep -q 'PLAY-" + what + "-" + extra' "$MAIN"; then
            echo 'Legacy opaque native player error is still present' >&2
            exit 1
          fi
          if grep -q 'Proxy(' "$MAIN"; then
            echo 'Unexpected proxy bypass code detected' >&2
            exit 1
          fi
          if grep -q 'HostnameVerifier' "$MAIN"; then
            echo 'Unexpected TLS verifier bypass detected' >&2
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Android APK
        working-directory: project-lumen-preview
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleDebug 2>&1 | tee ../android-build-13.1.23.log

      - name: Prepare release files
        if: always()
        shell: bash
        run: |
          set -u
          mkdir -p dist
          if [ -f project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.23_Media3_Streaming_Player.apk
            sha256sum dist/Project_Lumen_13.1.23_Media3_Streaming_Player.apk > dist/Project_Lumen_13.1.23_Media3_Streaming_Player.sha256
          fi
          [ -f project-lumen-preview/README.md ] && cp project-lumen-preview/README.md dist/README.md || true
          [ -f android-build-13.1.23.log ] && cp android-build-13.1.23.log dist/android-build-13.1.23.log || true
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.23 Media3 Streaming Player

          Root cause from the real screenshots:
          - the playlist, category separation and channel selection work
          - both a live channel and a VOD item fail in Android VideoView
          - PLAY-1--2147483648 is only the platform MediaPlayer's opaque unknown-error pair
          - VideoView sends no Project Lumen/VLC-compatible streaming user agent
          - the platform player has limited support for IPTV MPEG-TS, HLS and provider redirects

          Correction:
          - replace VideoView/MediaPlayer with AndroidX Media3 ExoPlayer
          - use PlayerView controls on phones and remote-friendly fullscreen playback on TV
          - use the successful VLC-compatible user agent for stream requests
          - allow legitimate HTTP/HTTPS redirects without proxy, VPN or TLS bypass
          - add progressive, HLS, DASH and RTSP playback modules
          - distinguish HTTP, network, format/container and decoder failures
          - log only scheme, port, hashed host, stream type and file extension
          - never log full stream URLs, usernames or passwords
          - preserve the 13.1.22 POC home, encrypted persistence and import watchdog
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-lumen-13-1-23-media3-streaming-player
          path: dist/
          if-no-files-found: error
          retention-days: 30
