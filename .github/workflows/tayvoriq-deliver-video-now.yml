name: TAYVORIQ Deliver Video Now

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-deliver-video-now.yml

permissions:
  contents: read

concurrency:
  group: tayvoriq-final-video-delivery
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PYTHONPATH: ${{ github.workspace }}/implementation:${{ github.workspace }}/implementation/tools
  TAYVORIQ_CLOUD_MODE: "true"
  TAYVORIQ_RENDER_SIZE: "1080x1920"
  TAYVORIQ_AUDIO_END_PADDING_SECONDS: "1.25"
  TAYVORIQ_TTS_PROVIDER: "auto"
  TAYVORIQ_CHATTERBOX_ENABLED: "true"
  TAYVORIQ_CHATTERBOX_MODEL_VERSION: "v3"
  TAYVORIQ_CHATTERBOX_LANGUAGE: "de"
  TAYVORIQ_CHATTERBOX_TIMEOUT_SECONDS: "300"
  TAYVORIQ_CHATTERBOX_MAX_CHUNKS: "2"
  TAYVORIQ_CHATTERBOX_MAX_CHARS: "520"
  TAYVORIQ_CHATTERBOX_CPU_THREADS: "4"
  TAYVORIQ_CHATTERBOX_EXAGGERATION: "0.46"
  TAYVORIQ_CHATTERBOX_CFG_WEIGHT: "0.34"
  TAYVORIQ_CHATTERBOX_PAUSE_MS: "180"
  TAYVORIQ_RENDER_TIMEOUT_SECONDS: "360"
  TAYVORIQ_EDGE_RECOVERY_TIMEOUT_SECONDS: "360"
  TAYVORIQ_AUDIT_TIMEOUT_SECONDS: "240"
  TAYVORIQ_AUDIT_RETRY_DELAYS: "0,10,25"
  TAYVORIQ_CONTROLLER_TIMEOUT_SECONDS: "1500"
  TAYVORIQ_TELEGRAM_PROGRESS: "false"
  HF_HOME: ${{ github.workspace }}/.cache/huggingface
  TORCH_HOME: ${{ github.workspace }}/.cache/torch
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  HF_TOKEN: ${{ secrets.HF_TOKEN }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  YOUTUBE_DATA_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          for name in PRIVATE_REPO_TOKEN PAGES_DEPLOY_TOKEN TELEGRAM_BOT_TOKEN TELEGRAM_CHAT_ID PEXELS_API_KEY GROQ_API_KEY GEMINI_API_KEY; do
            test -n "${!name:-}" || { echo "::error title=Missing secret::$name"; exit 1; }
          done

      - name: Checkout implementation
        uses: actions/checkout@v4
        with:
          repository: mojo72549-arch/shorts-agent-studio
          ref: feature/multi-platform-distribution-package
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: implementation
          fetch-depth: 1

      - name: Checkout review pages
        uses: actions/checkout@v4
        with:
          repository: mojo72549-arch/mind-reset-daily
          ref: main
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages-worktree
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: implementation/requirements.txt

      - name: Restore voice model cache
        uses: actions/cache@v4
        with:
          path: |
            .cache/huggingface
            .cache/torch
          key: tayvoriq-chatterbox-v3-cpu-py311-v4

      - name: Install media and project dependencies
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg rsync git
          python -m pip install --upgrade pip -q
          python -m pip install -r implementation/requirements.txt pytest -q
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.6.0" "torchaudio==2.6.0" -q

      - name: Install Chatterbox V3 premium voice
        id: chatterbox
        continue-on-error: true
        timeout-minutes: 10
        run: |
          set -euo pipefail
          python -m pip install "git+https://github.com/resemble-ai/chatterbox.git@65b18437192794391a0308a8f705b1e33e633948" -q
          python -c 'import inspect; from chatterbox.mtl_tts import ChatterboxMultilingualTTS as C; assert "t3_model" in inspect.signature(C.from_pretrained).parameters'

      - name: Preflight current implementation
        working-directory: implementation
        run: |
          set -euo pipefail
          python -m compileall -q tools src
          python tools/tayvoriq_preflight_check.py --report-out out/control-plane/preflight.json

      - name: Produce and strictly audit one current video
        id: production
        working-directory: implementation
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p out/tayvoriq-self-heal
          set +e
          python tools/tayvoriq_autonomous_entrypoint.py \
            --trend-mode auto_trend \
            --trend-scope auto_scope \
            --topic "" \
            --language Deutsch \
            --platform youtube_tiktok \
            --target-duration 35 \
            --llm-provider auto \
            --outdir out/tayvoriq-youtube-tiktok \
            --site-root site/tayvoriq \
            --run-id "${GITHUB_RUN_ID}" \
            --state-out out/tayvoriq-review-state.json \
            --report-out out/tayvoriq-self-heal/report.json \
            --request-out out/tayvoriq-self-heal/request.json \
            --self-heal-depth 0 \
            --target-branch feature/multi-platform-distribution-package \
            2>&1 | tee out/tayvoriq-self-heal/controller-console.log
          process_exit=${PIPESTATUS[0]}
          set -e
          state=$(python -c 'import json,pathlib; p=pathlib.Path("out/tayvoriq-self-heal/report.json"); d=json.loads(p.read_text()) if p.exists() else {}; print(d.get("state") or "TECHNICAL_FAILURE")')
          echo "state=$state" >> "$GITHUB_OUTPUT"
          echo "process_exit=$process_exit" >> "$GITHUB_OUTPUT"
          echo "Production state: $state, process exit: $process_exit"

      - name: Validate final publication gates
        id: publication_gate
        if: steps.production.outputs.state == 'SUCCESS'
        working-directory: implementation
        run: |
          set -euo pipefail
          JOB_DIR=$(python -c 'import json,pathlib; d=json.loads(pathlib.Path("out/tayvoriq-review-state.json").read_text()); print(d.get("job_dir") or "")')
          test -n "$JOB_DIR"
          test -d "$JOB_DIR"
          python tools/tayvoriq_publication_quality_gate_v2.py --job-dir "$JOB_DIR" --targets youtube_tiktok

      - name: Publish review page
        id: publish_review
        if: steps.production.outputs.state == 'SUCCESS'
        run: |
          set -euo pipefail
          test -d implementation/site/tayvoriq
          rm -rf pages-worktree/tayvoriq
          mkdir -p pages-worktree/tayvoriq
          rsync -a implementation/site/tayvoriq/ pages-worktree/tayvoriq/
          touch pages-worktree/.nojekyll
          cd pages-worktree
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tayvoriq .nojekyll
          if ! git diff --cached --quiet; then
            git commit -m "Publish TAYVORIQ review ${GITHUB_RUN_ID}"
            git push origin main
          fi

      - name: Send only final Telegram approval review
        id: telegram_final
        if: steps.production.outputs.state == 'SUCCESS'
        working-directory: implementation
        run: |
          set -euo pipefail
          python tools/tayvoriq_send_telegram.py \
            --state SUCCESS \
            --conclusion success \
            --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --review-id "${GITHUB_RUN_ID}" \
            --review-url "https://mojo72549-arch.github.io/mind-reset-daily/tayvoriq/runs/${GITHUB_RUN_ID}/"

      - name: Verify delivery evidence
        if: steps.production.outputs.state == 'SUCCESS'
        working-directory: implementation
        env:
          PUBLICATION_GATE_OUTCOME: ${{ steps.publication_gate.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish_review.outcome }}
          TELEGRAM_OUTCOME: ${{ steps.telegram_final.outcome }}
        run: |
          set -euo pipefail
          python -c 'import json,pathlib,os,subprocess; s=json.loads(pathlib.Path("out/tayvoriq-review-state.json").read_text()); j=pathlib.Path(s["job_dir"]); vids=[j/"short_youtube.mp4",j/"short_tiktok.mp4"]; assert all(v.is_file() and v.stat().st_size>100000 for v in vids); assert os.environ["PUBLICATION_GATE_OUTCOME"]=="success"; assert os.environ["PUBLISH_OUTCOME"]=="success"; assert os.environ["TELEGRAM_OUTCOME"]=="success"; print({"definition_of_done":"passed","job_dir":str(j),"videos":[str(v) for v in vids]})'

      - name: Collect diagnostics
        if: always()
        continue-on-error: true
        working-directory: implementation
        run: |
          python tools/tayvoriq_collect_compact_diagnostics.py --root out --destination out/tayvoriq-compact-diagnostics --max-file-bytes 10485760

      - name: Upload complete video and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tayvoriq-final-delivery-${{ github.run_id }}
          path: |
            implementation/out/**
            implementation/site/tayvoriq/**
          if-no-files-found: warn
          retention-days: 30

      - name: Fail when no approved review was delivered
        if: steps.production.outputs.state != 'SUCCESS'
        env:
          FINAL_STATE: ${{ steps.production.outputs.state }}
        run: |
          echo "::error title=TAYVORIQ delivery incomplete::Final state ${FINAL_STATE}. No incomplete video was sent."
          exit 1

