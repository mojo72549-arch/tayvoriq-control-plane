name: Project Lumen 13.1.26 Stable Signed Pilot Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - '.github/workflows/lumen-restore-language-hotfix-stable-final.yml'
      - 'lumen-public-preview/patch-13.1.25-fast-catalog-visual-quality.gz.b64'
      - 'lumen-public-preview/patch-13.1.26-restore-language-hotfix.gz.b64'
      - 'lumen-public-preview/project-lumen-pilot-debug.jks.b64'
      - 'lumen-public-preview/**'

permissions:
  contents: read

concurrency:
  group: project-lumen-13-1-26-stable-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Restore Project Lumen base
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview

          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          echo 'c3edf3920f500f707dab2c0d6370f028e2c5d1aabc823ea14451606c377c948a  /tmp/diagnostics.py' | sha256sum -c -
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview

      - name: Correct and apply resilient download patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lumen-public-preview/apply-resilient-download-fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'download_block + "    private static URL buildBrokenHttpsRedirectRecoveryUrl("',
              'download_block')
          text = text.replace(
              'share_block + "    private void clearDiagnosticLog() {"',
              'share_block')
          text = text.replace(
              "        '''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"",
              "        r'''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"")
          text = text.replace(
              "        '''            showDiagnostic(\n                    partialRecovery ?",
              "        r'''            showDiagnostic(\n                    partialRecovery ?")
          text = text.replace(
              "        '''                showDiagnostic(\"Senderliste bereit\"",
              "        r'''                showDiagnostic(\"Senderliste bereit\"")
          text = text.replace(
              "        '''                showDiagnostic(partialRecovery ?",
              "        r'''                showDiagnostic(partialRecovery ?")
          path.write_text(text, encoding='utf-8')
          PY
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview

      - name: Apply transport persistence Media3 and premium UI fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-http451-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-api-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-account-status-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-channel-adapter-crash-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-import-start-watchdog-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-poc-home-persistence-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-media3-player-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-media3-sdk35-compat-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-premium-ui-language-hubs-fix.py project-lumen-preview

      - name: Apply 13.1.25 and 13.1.26 patches
        shell: bash
        run: |
          set -euo pipefail
          base64 -d lumen-public-preview/patch-13.1.25-fast-catalog-visual-quality.gz.b64 > /tmp/lumen-13.1.25.patch.gz
          gzip -dc /tmp/lumen-13.1.25.patch.gz > /tmp/lumen-13.1.25.patch
          patch --batch --forward -p0 < /tmp/lumen-13.1.25.patch

          base64 -d lumen-public-preview/patch-13.1.26-restore-language-hotfix.gz.b64 > /tmp/lumen-13.1.26.patch.gz
          gzip -dc /tmp/lumen-13.1.26.patch.gz > /tmp/lumen-13.1.26.patch
          patch --batch --forward -p0 < /tmp/lumen-13.1.26.patch
          sed -i 's/text("v13.1.25"/text("v13.1.26"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java

      - name: Verify restore language and safety gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          GRADLE=project-lumen-preview/app/build.gradle
          grep -q 'text("v13.1.26"' "$MAIN"
          grep -q 'CATALOG_VERSION = 2' "$MAIN"
          grep -q 'CATALOG_VERSION_LEGACY = 1' "$MAIN"
          grep -q 'Code=RESTORE-CATALOG-OK' "$MAIN"
          grep -q 'Code=RESTORE-SLOW' "$MAIN"
          grep -q 'Code=RESTORE-TIMEOUT' "$MAIN"
          grep -q 'if (catalog.isFile())' "$MAIN"
          grep -q 'activateFileAtomically' "$MAIN"
          grep -q 'data.writeByte(channel.section.ordinal())' "$MAIN"
          grep -q 'data.writeByte(channel.hub.ordinal())' "$MAIN"
          grep -q 'languageHubFromOrdinal' "$MAIN"
          grep -q 'RESTORE_HARD_TIMEOUT_MS = 45_000L' "$MAIN"
          grep -q 'safeMessage(Throwable e)' "$MAIN"
          grep -q 'versionCode 133600' "$GRADLE"
          grep -q "versionName '13.1.26-restore-language-hotfix-preview'" "$GRADLE"
          grep -q 'com.github.bumptech.glide:glide:4.16.0' "$GRADLE"
          grep -q 'media3-exoplayer' "$GRADLE"
          if grep -q 'HostnameVerifier' "$MAIN"; then
            echo 'Unexpected TLS verifier bypass detected' >&2
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Android APK
        working-directory: project-lumen-preview
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleDebug 2>&1 | tee ../android-build-13.1.26.log

      - name: Sign and verify with stable pilot certificate
        shell: bash
        run: |
          set -euo pipefail
          base64 -d lumen-public-preview/project-lumen-pilot-debug.jks.b64 > /tmp/project-lumen-pilot-debug.jks
          echo '09d67cdecac40a4e03edcfd09047377ed4a9e9c01c5bc23140e1f15b0b2cbef8  /tmp/project-lumen-pilot-debug.jks' | sha256sum -c -
          mkdir -p dist
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/Android/Sdk}}"
          APKSIGNER="$SDK_ROOT/build-tools/35.0.0/apksigner"
          INPUT=project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk
          OUTPUT=dist/Project_Lumen_13.1.26_Restore_Language_Hotfix_Stable_Pilot.apk
          "$APKSIGNER" sign \
            --ks /tmp/project-lumen-pilot-debug.jks \
            --ks-key-alias lumenPilot \
            --ks-pass pass:projectlumenpilot \
            --key-pass pass:projectlumenpilot \
            --out "$OUTPUT" \
            "$INPUT"
          "$APKSIGNER" verify --verbose --print-certs "$OUTPUT" | tee pilot-certificate.txt
          sha256sum "$OUTPUT" > dist/Project_Lumen_13.1.26_Restore_Language_Hotfix_Stable_Pilot.sha256
          grep -qi 'Project Lumen Pilot' pilot-certificate.txt
          grep -qi '2550241518d5d562d75ee5e271a4cff530b2bacf86d18eee5642d2c20daf9e96' pilot-certificate.txt

      - name: Prepare release files
        if: always()
        shell: bash
        run: |
          set -u
          mkdir -p dist
          [ -f android-build-13.1.26.log ] && cp android-build-13.1.26.log dist/android-build-13.1.26.log || true
          [ -f pilot-certificate.txt ] && cp pilot-certificate.txt dist/pilot-certificate.txt || true
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.26 Restore and Language Hotfix - Stable Pilot

          Important installation note:
          - Android cannot update the older 13.1.25 preview because that build used an ephemeral GitHub debug certificate.
          - Record the source link first, uninstall the old preview once, then install this stable pilot APK and import the source again.
          - Starting with this stable pilot certificate, later pilot APKs can update normally without another uninstall.

          Corrected:
          - cold-start restoration always tries the encrypted quick-start catalog first
          - stale active_catalog_ready preference can no longer force a full 81 MB fallback parse
          - restoration cannot leave the UI permanently blocked after an Error or timeout
          - explicit RESTORE-SLOW and RESTORE-TIMEOUT diagnostics
          - atomic catalog replacement and durable catalog-ready state
          - catalog v2 persists media section and language hub explicitly
          - legacy catalog v1 remains readable
          - stronger German and Turkish country/language recognition
          - start content scroll is reset to avoid clipped restoration cards
          - Media3 playback, encrypted raw playlist fallback, logos/posters and safe diagnostics remain

          Security scope:
          - this fixed certificate is only for the public debug/pilot package
          - production distribution will use a separate private package and release key
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-lumen-13-1-26-restore-language-hotfix-stable-signed
          path: dist/
          if-no-files-found: error
          retention-days: 30
