name: Project Lumen 13.1.28 R3 Source Export for R4

on:
  pull_request:
    branches: [ lumen-13-1-28-r3-epg-search-favorites ]
    paths:
      - '.github/workflows/lumen-r3-source-export-for-r4.yml'
      - 'lumen-public-preview/patch-13.1.28-r3.part*.b64'

permissions:
  actions: read
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Restore verified R1 generated source artifact
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/r1-artifact
          gh api repos/${GITHUB_REPOSITORY}/actions/artifacts/8604202966/zip > /tmp/r1-source.zip
          unzip -q /tmp/r1-source.zip -d /tmp/r1-artifact
          cd /tmp/r1-artifact
          sha256sum -c project-lumen-13.1.27-r1-generated-source.sha256
          cd "$GITHUB_WORKSPACE"
          tar -xzf /tmp/r1-artifact/project-lumen-13.1.27-r1-generated-source.tar.gz

      - name: Apply verified R3 patch
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/patch-13.1.28-r3.part*.b64 > /tmp/lumen-13.1.28-r3.b64
          base64 -d /tmp/lumen-13.1.28-r3.b64 > /tmp/lumen-13.1.28-r3.patch.gz
          gzip -dc /tmp/lumen-13.1.28-r3.patch.gz > /tmp/lumen-13.1.28-r3.patch
          sha256sum /tmp/lumen-13.1.28-r3.b64 /tmp/lumen-13.1.28-r3.patch.gz /tmp/lumen-13.1.28-r3.patch
          if patch --dry-run --batch --forward -p0 < /tmp/lumen-13.1.28-r3.patch >/tmp/patch-p0.log 2>&1; then
            cat /tmp/patch-p0.log
            patch --batch --forward -p0 < /tmp/lumen-13.1.28-r3.patch
          elif patch --dry-run --batch --forward -p1 < /tmp/lumen-13.1.28-r3.patch >/tmp/patch-p1.log 2>&1; then
            cat /tmp/patch-p1.log
            patch --batch --forward -p1 < /tmp/lumen-13.1.28-r3.patch
          else
            cat /tmp/patch-p0.log >&2 || true
            cat /tmp/patch-p1.log >&2 || true
            exit 1
          fi
          grep -q 'text("v13.1.28"' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          grep -q 'CATALOG_VERSION = 4' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java

      - name: Package generated R3 source
        shell: bash
        run: |
          set -euo pipefail
          tar -czf project-lumen-13.1.28-r3-generated-source.tar.gz project-lumen-preview
          sha256sum project-lumen-13.1.28-r3-generated-source.tar.gz > project-lumen-13.1.28-r3-generated-source.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-28-r3-generated-source
          path: |
            project-lumen-13.1.28-r3-generated-source.tar.gz
            project-lumen-13.1.28-r3-generated-source.sha256
          if-no-files-found: error
          retention-days: 7
