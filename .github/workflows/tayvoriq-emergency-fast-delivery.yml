name: TAYVORIQ Emergency Fast Delivery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-emergency-fast-delivery.yml

permissions:
  actions: write
  contents: read

# This group is intentionally identical to the Golden Path group. Starting
# this recovery workflow cancels a currently running slow Golden Path before
# a fresh run is dispatched with the latest implementation.
concurrency:
  group: tayvoriq-golden-path
  cancel-in-progress: true

jobs:
  replace-slow-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch verified fast delivery chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-trigger-full-now.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main
          echo "Slow Golden Path replaced. Fast delivery trigger dispatched."
