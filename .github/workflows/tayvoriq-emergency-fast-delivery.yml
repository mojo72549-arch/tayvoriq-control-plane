name: TAYVORIQ Emergency Premium Recovery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-emergency-fast-delivery.yml

permissions:
  actions: write
  contents: read

# Replace any stale Golden Path with the latest bounded implementation. The
# replacement keeps Chatterbox premium-first, uses YouTube OAuth for real trend
# signals and sends Telegram only after a verified final video exists.
concurrency:
  group: tayvoriq-golden-path
  cancel-in-progress: true

jobs:
  replace-slow-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch latest bounded premium production chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-trigger-full-now.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main
          echo "Latest bounded production dispatched with YouTube OAuth trend auth, source-trigger grounding and final-only Telegram."

