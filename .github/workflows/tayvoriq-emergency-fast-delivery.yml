name: TAYVORIQ Emergency Premium Recovery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-emergency-fast-delivery.yml

permissions:
  actions: write
  contents: read

# Uses the Golden Path concurrency group to replace any old unbounded attempt.
# The implementation remains Chatterbox-premium-first, but nested full reruns
# are disabled and temporary audit failures retry the existing render only.
concurrency:
  group: tayvoriq-golden-path
  cancel-in-progress: true

jobs:
  replace-slow-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch bounded premium production chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-trigger-full-now.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main
          echo "Bounded Chatterbox-premium production dispatched with stage-local audit retries."

