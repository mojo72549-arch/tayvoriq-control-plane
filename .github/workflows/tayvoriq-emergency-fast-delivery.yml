name: TAYVORIQ Emergency Premium Recovery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-emergency-fast-delivery.yml

permissions:
  actions: write
  contents: read

# Uses the Golden Path concurrency group to replace the currently running
# unbounded attempt. The new implementation remains Chatterbox-premium-first,
# but its worker is process-tree bounded and falls back only after a real fault.
concurrency:
  group: tayvoriq-golden-path
  cancel-in-progress: true

jobs:
  replace-slow-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch bounded premium production chain
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-trigger-full-now.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main
          echo "Slow run replaced. Chatterbox-premium-first production dispatched."

