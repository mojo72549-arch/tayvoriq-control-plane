name: Run TAYVORIQ Golden Path Once

on:
  push:
    branches:
      - run/golden-path-20260717
    paths:
      - .github/workflows/run-golden-path-once.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch Golden Path full run on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run tayvoriq-golden-path.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f mode=full \
            -f trend_scope=auto_scope \
            -f topic=""
