name: Project Lumen Resilience Patch Debug

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - 'lumen-public-preview/apply-resilient-download-fix.py'
      - '.github/workflows/lumen-resilience-debug.yml'

permissions:
  contents: read

jobs:
  debug-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Restore source through v13.1.15
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          tar -xzf /tmp/source.tar.gz
          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          tar -xzf /tmp/patch.tar.gz
          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview
          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview
          mkdir -p debug-before
          cp project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java debug-before/MainActivity.java
          cp project-lumen-preview/app/build.gradle debug-before/app-build.gradle

      - name: Apply resilience patch with captured output
        id: resilience
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview 2>&1 | tee resilience-patch.log

      - name: Package after state
        if: always()
        shell: bash
        run: |
          mkdir -p debug-after
          cp project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java debug-after/MainActivity.java || true
          cp project-lumen-preview/app/build.gradle debug-after/app-build.gradle || true
          cp lumen-public-preview/apply-resilient-download-fix.py debug-after/apply-resilient-download-fix.py
          cp resilience-patch.log debug-after/resilience-patch.log || true

      - name: Upload patch debug bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-16-patch-debug
          path: |
            debug-before/
            debug-after/
          if-no-files-found: error
          retention-days: 7

      - name: Fail if patch failed
        if: steps.resilience.outcome != 'success'
        run: exit 1
