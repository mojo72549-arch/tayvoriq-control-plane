name: Project Lumen 13.1.24 Premium UI and Language Hubs Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - '.github/workflows/lumen-premium-ui-language-hubs-final.yml'
      - 'lumen-public-preview/apply-premium-ui-language-hubs-fix.py'
      - 'lumen-public-preview/apply-media3-player-fix.py'
      - 'lumen-public-preview/apply-media3-sdk35-compat-fix.py'
      - 'lumen-public-preview/apply-poc-home-persistence-fix.py'
      - 'lumen-public-preview/apply-import-start-watchdog-fix.py'

permissions:
  contents: read

concurrency:
  group: project-lumen-13-1-24-premium-ui-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Restore Project Lumen through v13.1.15
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview

          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          echo 'c3edf3920f500f707dab2c0d6370f028e2c5d1aabc823ea14451606c377c948a  /tmp/diagnostics.py' | sha256sum -c -
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview

      - name: Correct and apply resilient download patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lumen-public-preview/apply-resilient-download-fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'download_block + "    private static URL buildBrokenHttpsRedirectRecoveryUrl("',
              'download_block')
          text = text.replace(
              'share_block + "    private void clearDiagnosticLog() {"',
              'share_block')
          text = text.replace(
              "        '''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"",
              "        r'''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"")
          text = text.replace(
              "        '''            showDiagnostic(\n                    partialRecovery ?",
              "        r'''            showDiagnostic(\n                    partialRecovery ?")
          text = text.replace(
              "        '''                showDiagnostic(\"Senderliste bereit\"",
              "        r'''                showDiagnostic(\"Senderliste bereit\"")
          text = text.replace(
              "        '''                showDiagnostic(partialRecovery ?",
              "        r'''                showDiagnostic(partialRecovery ?")
          path.write_text(text, encoding='utf-8')
          PY
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview

      - name: Apply transport, persistence, player and premium UI fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-http451-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-api-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-account-status-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-channel-adapter-crash-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-import-start-watchdog-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-poc-home-persistence-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-media3-player-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-media3-sdk35-compat-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-premium-ui-language-hubs-fix.py project-lumen-preview

      - name: Verify v13.1.24 premium UX, language and safety gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          GRADLE=project-lumen-preview/app/build.gradle
          grep -q 'text("v13.1.24"' "$MAIN"
          grep -q 'PROJECT LUMEN' "$MAIN"
          grep -q 'Premium Media Player' "$MAIN"
          grep -q 'private enum LanguageHub { ALL, GERMAN, TURKISH, ENGLISH, OTHER }' "$MAIN"
          grep -q 'Live-TV nach Sprache' "$MAIN"
          grep -q 'Deutsch' "$MAIN"
          grep -q 'Türkisch' "$MAIN"
          grep -q 'Englisch' "$MAIN"
          grep -q 'private void premiumHero' "$MAIN"
          grep -q 'private void premiumMediaRow' "$MAIN"
          grep -q 'private LanguageHub classifyLanguage' "$MAIN"
          grep -q 'attribute(line, "tvg-language")' "$MAIN"
          grep -q 'attribute(line, "tvg-country")' "$MAIN"
          grep -q 'attribute(line, "tvg-logo")' "$MAIN"
          grep -q 'classifyLanguage(channel) != languageHub' "$MAIN"
          grep -q 'reportedPercent = Math.min(95' "$MAIN"
          grep -q 'private ExoPlayer exoPlayer' "$MAIN"
          grep -q 'PLAY-MEDIA3-' "$MAIN"
          grep -q 'Code=RESTORE-OK' "$MAIN"
          grep -q 'IMPORT-WORKER-START-TIMEOUT' "$MAIN"
          grep -q 'ProjectLumen/13.1.24 Android' "$MAIN"
          grep -q 'def media3_version = "1.9.4"' "$GRADLE"
          grep -q 'versionCode 133400' "$GRADLE"
          grep -q "versionName '13.1.24-premium-ui-language-hubs-preview'" "$GRADLE"
          if grep -q 'VideoView' "$MAIN"; then
            echo 'Legacy VideoView is still present' >&2
            exit 1
          fi
          if grep -q 'Proxy(' "$MAIN"; then
            echo 'Unexpected proxy bypass code detected' >&2
            exit 1
          fi
          if grep -q 'HostnameVerifier' "$MAIN"; then
            echo 'Unexpected TLS verifier bypass detected' >&2
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Android APK
        working-directory: project-lumen-preview
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleDebug 2>&1 | tee ../android-build-13.1.24.log

      - name: Prepare release files
        if: always()
        shell: bash
        run: |
          set -u
          mkdir -p dist
          if [ -f project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.24_Premium_UI_Language_Hubs.apk
            sha256sum dist/Project_Lumen_13.1.24_Premium_UI_Language_Hubs.apk > dist/Project_Lumen_13.1.24_Premium_UI_Language_Hubs.sha256
          fi
          [ -f project-lumen-preview/README.md ] && cp project-lumen-preview/README.md dist/README.md || true
          [ -f android-build-13.1.24.log ] && cp android-build-13.1.24.log dist/android-build-13.1.24.log || true
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.24 Premium UI and Language Hubs

          Premium experience:
          - distinct Project Lumen dark premium visual language
          - large hero area and horizontal media rows
          - premium cards for live TV, films and series
          - dynamic navigation: before import only Start/Settings; after import Live/Films/Series appear
          - phone-friendly horizontal navigation and TV-focusable controls

          Language hubs:
          - Deutsch, Türkisch, Englisch and Weitere Sprachen
          - classification priority: explicit M3U language, country, provider group, then controlled channel-name fallback
          - M3U parser now preserves tvg-language, tvg-country and tvg-logo metadata
          - live list can be filtered with language chips
          - unknown or ambiguous entries remain under Weitere instead of being forced into a wrong language

          Performance and stability:
          - home counts and preview rows are built in one pass across the 100,000-entry list
          - encrypted-storage progress UI/logging reduced to five-percent steps
          - Media3 player, encrypted persistence, RESTORE-OK and import watchdog preserved
          - no full stream URLs or credentials added to diagnostics
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-lumen-13-1-24-premium-ui-language-hubs
          path: dist/
          if-no-files-found: error
          retention-days: 30
