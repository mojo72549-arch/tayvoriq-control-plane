name: Project Lumen Public Preview Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - 'lumen-public-preview/**'
      - '.github/workflows/lumen-public-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-lumen-public-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout public preview
        uses: actions/checkout@v4

      - name: Restore sanitized Project Lumen source
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/project-lumen-source.tar.gz.b64
          base64 -d /tmp/project-lumen-source.tar.gz.b64 > /tmp/project-lumen-source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/project-lumen-source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/project-lumen-source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/project-lumen-13.1.9-patch.tar.gz.b64
          base64 -d /tmp/project-lumen-13.1.9-patch.tar.gz.b64 > /tmp/project-lumen-13.1.9-patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/project-lumen-13.1.9-patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/project-lumen-13.1.9-patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          grep -q 'text("v13.1.9"' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java

      - name: Apply HTTP origin transport recovery
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle

      - name: Verify HTTP recovery safety gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          grep -q 'IMPORT-HTTP-REDIRECT-RECOVERY' "$MAIN"
          grep -q 'IMPORT-HTTP-RECOVERY' "$MAIN"
          grep -q 'VLC/3.0.20 LibVLC/3.0.20' "$MAIN"
          grep -q 'recoveryPort == 443' "$MAIN"
          grep -q '!"http".equalsIgnoreCase(original.getProtocol())' "$MAIN"
          grep -q 'text("v13.1.11"' "$MAIN"
          grep -q "applicationId 'com.projectlumen.publicpreview.tlsrecovery'" project-lumen-preview/app/build.gradle
          grep -q 'versionCode 132100' project-lumen-preview/app/build.gradle
          grep -q "versionName '13.1.11-http-origin-recovery-preview'" project-lumen-preview/app/build.gradle

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Validate Windows PowerShell syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("project-lumen-preview/windows/ProjectLumen.Windows.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Build Android APK
        working-directory: project-lumen-preview
        run: gradle --no-daemon clean assembleDebug

      - name: Prepare public downloads
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/windows
          cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.11_HTTP_Recovery.apk
          cp project-lumen-preview/windows/* dist/windows/
          cp project-lumen-preview/README.md dist/
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.11 HTTP Origin Recovery

          - fixes the real v13.1.10 IMPORT-TLS-MISMATCH smartphone result
          - uses a standard media-player user agent for M3U retrieval
          - automatically retains HTTP when an explicitly entered HTTP source is redirected to broken HTTPS
          - also recovers when the HTTPS mismatch is detected only during connection setup
          - never downgrades a source that the user entered directly as HTTPS
          - never downgrades standard TLS port 443
          - credentials and full source addresses remain hidden in diagnostics
          - active library remains unchanged when import fails
          EOF
          sha256sum dist/Project_Lumen_13.1.11_HTTP_Recovery.apk > dist/Project_Lumen_13.1.11_HTTP_Recovery.sha256
          (cd dist && zip -r Project_Lumen_Windows_Public_Preview.zip windows >/dev/null)

      - name: Upload APK and Windows preview
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-11-http-origin-recovery
          path: dist/
          if-no-files-found: error
          retention-days: 30
