name: Project Lumen Public Preview Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'lumen-public-preview/**'
      - '.github/workflows/lumen-public-preview.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: project-lumen-public-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout public preview
        uses: actions/checkout@v4

      - name: Restore sanitized Project Lumen source
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          exec > >(tee -a diagnostics/restore-status.txt) 2>&1
          echo '=== restore start ==='
          pwd
          find lumen-public-preview -maxdepth 1 -type f -printf '%f %s bytes\n' | sort

          cat lumen-public-preview/source.part*.b64 > /tmp/project-lumen-source.tar.gz.b64
          echo "source concat rc=$? bytes=$(wc -c < /tmp/project-lumen-source.tar.gz.b64 2>/dev/null)"
          base64 -d /tmp/project-lumen-source.tar.gz.b64 > /tmp/project-lumen-source.tar.gz
          echo "source decode rc=$? bytes=$(wc -c < /tmp/project-lumen-source.tar.gz 2>/dev/null)"
          sha256sum /tmp/project-lumen-source.tar.gz || true
          tar -xzf /tmp/project-lumen-source.tar.gz
          echo "source extract rc=$?"

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/project-lumen-13.1.9-patch.tar.gz.b64
          echo "patch concat rc=$? bytes=$(wc -c < /tmp/project-lumen-13.1.9-patch.tar.gz.b64 2>/dev/null)"
          base64 -d /tmp/project-lumen-13.1.9-patch.tar.gz.b64 > /tmp/project-lumen-13.1.9-patch.tar.gz
          echo "patch decode rc=$? bytes=$(wc -c < /tmp/project-lumen-13.1.9-patch.tar.gz 2>/dev/null)"
          sha256sum /tmp/project-lumen-13.1.9-patch.tar.gz || true
          tar -xzf /tmp/project-lumen-13.1.9-patch.tar.gz
          echo "patch extract rc=$?"

          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          if [ -f "$MAIN" ]; then
            sed -i 's/text("v13.1.8"/text("v13.1.9"/' "$MAIN"
            echo "main activity found bytes=$(wc -c < "$MAIN")"
            grep -n 'v13.1.9' "$MAIN" || true
          else
            echo 'ERROR: MainActivity.java missing after extraction'
          fi
          echo '=== restore end ==='
          exit 0

      - name: Capture transport diagnostics
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p diagnostics
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          if [ -f "$MAIN" ]; then
            cp "$MAIN" diagnostics/MainActivity.java
          fi
          if [ -d project-lumen-preview ]; then
            grep -RInE 'IMPORT-CONNECT|TLS packet|HttpsURLConnection|HttpURLConnection|openConnection|Location|redirect|https://|http://' project-lumen-preview/app/src/main/java > diagnostics/transport-references.txt || true
            tar -czf diagnostics/project-lumen-restored-source.tar.gz project-lumen-preview
          fi
          find diagnostics -maxdepth 1 -type f -printf '%f %s bytes\n' | sort | tee -a diagnostics/restore-status.txt
          exit 0

      - name: Upload transport diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-tls-diagnostics
          path: diagnostics/
          if-no-files-found: error
          retention-days: 7

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Validate Windows PowerShell syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("project-lumen-preview/windows/ProjectLumen.Windows.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Build Android APK
        working-directory: project-lumen-preview
        run: gradle --no-daemon clean assembleDebug

      - name: Prepare public downloads
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/windows
          cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.9_Public_Preview.apk
          cp project-lumen-preview/windows/* dist/windows/
          cp project-lumen-preview/README.md dist/
          sha256sum dist/Project_Lumen_13.1.9_Public_Preview.apk > dist/Project_Lumen_13.1.9_Public_Preview.sha256
          (cd dist && zip -r Project_Lumen_Windows_Public_Preview.zip windows >/dev/null)

      - name: Upload APK and Windows preview
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-9-public-preview
          path: dist/
          if-no-files-found: error
          retention-days: 30
