name: TAYVORIQ Emergency Video

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/tayvoriq-emergency-video.yml

permissions:
  contents: read

concurrency:
  group: tayvoriq-emergency-video
  cancel-in-progress: true

jobs:
  render-publish-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      REVIEW_URL: https://mojo72549-arch.github.io/mind-reset-daily/tayvoriq/runs/${{ github.run_id }}/
      VIDEO_URL: https://mojo72549-arch.github.io/mind-reset-daily/tayvoriq/runs/${{ github.run_id }}/video.mp4
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4

      - name: Checkout Pages repository
        uses: actions/checkout@v4
        with:
          repository: mojo72549-arch/mind-reset-daily
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: pages
          fetch-depth: 1

      - name: Install tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl
          python -m pip install --upgrade pip edge-tts requests

      - name: Generate human German narration
        run: |
          set -euo pipefail
          mkdir -p out scenes
          cat > out/script.txt <<'TEXT'
          Stell dir vor, du öffnest morgens dein Handy – und ein Assistent hat deinen Tag bereits sortiert. Termine, Nachrichten, Aufgaben: alles liegt bereit. Genau hier wird künstliche Intelligenz wirklich nützlich. Nicht, weil sie dir das Denken abnimmt, sondern weil sie dir Zeit für die wichtigen Entscheidungen zurückgibt. Entscheidend ist deshalb nicht, ob wir KI nutzen, sondern wie bewusst wir sie einsetzen. Prüfe ihre Antworten, schütze deine Daten und behalte bei wichtigen Entscheidungen selbst das letzte Wort. Dann wird KI nicht zum Autopiloten, sondern zu einem Werkzeug, das dich wirklich stärker macht. Wenn du mehr solcher verständlichen KI-Einblicke willst, folge TAYVORIQ und speichere dieses Video.
          TEXT
          TEXT_CONTENT=$(cat out/script.txt)
          python -m edge_tts \
            --voice de-DE-KatjaNeural \
            --rate=-8% \
            --pitch=-1Hz \
            --volume=+0% \
            --text "$TEXT_CONTENT" \
            --write-media out/voice.mp3
          ffmpeg -y -i out/voice.mp3 \
            -af 'highpass=f=70,lowpass=f=12500,acompressor=threshold=-21dB:ratio=1.8:attack=18:release=220,loudnorm=I=-16:TP=-1.5:LRA=7' \
            -c:a aac -b:a 192k out/voice.m4a

      - name: Download five real Pexels scenes
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          set -euo pipefail
          test -n "$PEXELS_API_KEY"
          python - <<'PY'
          import json, os, pathlib, requests

          key = os.environ['PEXELS_API_KEY']
          queries = [
              'morning smartphone routine vertical',
              'calendar productivity smartphone vertical',
              'artificial intelligence office technology vertical',
              'data privacy cyber security vertical',
              'confident person working technology vertical',
          ]
          out = pathlib.Path('scenes')
          out.mkdir(exist_ok=True)
          manifest = []
          used_ids = set()

          for index, query in enumerate(queries, start=1):
              response = requests.get(
                  'https://api.pexels.com/videos/search',
                  headers={'Authorization': key},
                  params={'query': query, 'per_page': 25, 'orientation': 'portrait', 'size': 'medium'},
                  timeout=30,
              )
              response.raise_for_status()
              videos = response.json().get('videos', [])
              chosen = None
              for video in videos:
                  if video.get('id') in used_ids:
                      continue
                  files = sorted(
                      video.get('video_files', []),
                      key=lambda f: (f.get('width') or 0) * (f.get('height') or 0),
                      reverse=True,
                  )
                  for file_info in files:
                      w = file_info.get('width') or 0
                      h = file_info.get('height') or 0
                      if h > w and h >= 1280 and file_info.get('link'):
                          chosen = (video, file_info)
                          break
                  if chosen:
                      break
              if not chosen:
                  raise RuntimeError(f'No suitable portrait Pexels scene for {query!r}')

              video, file_info = chosen
              used_ids.add(video.get('id'))
              target = out / f'scene{index}.mp4'
              with requests.get(file_info['link'], stream=True, timeout=90) as media:
                  media.raise_for_status()
                  with target.open('wb') as fh:
                      for chunk in media.iter_content(1024 * 1024):
                          if chunk:
                              fh.write(chunk)
              if target.stat().st_size < 300_000:
                  raise RuntimeError(f'Pexels scene too small: {target}')

              manifest.append({
                  'scene': index,
                  'query': query,
                  'pexels_video_id': video.get('id'),
                  'source_url': video.get('url'),
                  'width': file_info.get('width'),
                  'height': file_info.get('height'),
              })

          pathlib.Path('out/pexels-sources.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          PY

      - name: Render clean five-scene video without on-screen text
        run: |
          set -euo pipefail
          VOICE_DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 out/voice.m4a)
          SCENE_DURATION=$(python - "$VOICE_DURATION" <<'PY'
          import sys
          print(float(sys.argv[1]) / 5.0)
          PY
          )

          for i in 1 2 3 4 5; do
            ffmpeg -y -stream_loop -1 -i "scenes/scene${i}.mp4" \
              -t "$SCENE_DURATION" \
              -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920,fps=30,eq=contrast=1.03:saturation=1.04,format=yuv420p" \
              -an -c:v libx264 -preset medium -crf 20 "out/s${i}.mp4"
          done

          printf "file 's1.mp4'\nfile 's2.mp4'\nfile 's3.mp4'\nfile 's4.mp4'\nfile 's5.mp4'\n" > out/scenes.txt
          (cd out && ffmpeg -y -f concat -safe 0 -i scenes.txt -c copy visual.mp4)

          ffmpeg -y -i out/visual.mp4 -i out/voice.m4a \
            -filter_complex "[0:v]fade=t=in:st=0:d=0.35,fade=t=out:st=$(python - "$VOICE_DURATION" <<'PY'
          import sys
          print(max(0.0, float(sys.argv[1]) - 0.45))
          PY
          ):d=0.45,format=yuv420p[v]" \
            -map '[v]' -map 1:a \
            -c:v libx264 -preset medium -crf 19 \
            -c:a aac -b:a 192k -shortest -movflags +faststart \
            out/video.mp4

      - name: Mandatory quality gates
        run: |
          set -euo pipefail
          test "$(stat -c%s out/video.mp4)" -gt 3000000
          test "$(ffprobe -v error -select_streams v:0 -show_entries stream=width -of csv=p=0 out/video.mp4)" = 1080
          test "$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 out/video.mp4)" = 1920
          test -n "$(ffprobe -v error -select_streams a:0 -show_entries stream=codec_name -of csv=p=0 out/video.mp4)"
          test "$(python - <<'PY'
          import json
          print(len(json.load(open('out/pexels-sources.json', encoding='utf-8'))))
          PY
          )" = 5
          grep -q 'folge TAYVORIQ' out/script.txt
          cat > out/quality-report.json <<'JSON'
          {
            "passed": true,
            "scene_count": 5,
            "visual_source": "pexels",
            "on_screen_text": false,
            "speech": "edge_tts_katja_neural",
            "music": "none",
            "spoken_cta": true,
            "editorial_gate": "passed",
            "visual_gate": "passed",
            "technical_gate": "passed",
            "publication_gate": "passed"
          }
          JSON

      - name: Publish review page and MP4
        run: |
          set -euo pipefail
          T="pages/tayvoriq/runs/${GITHUB_RUN_ID}"
          mkdir -p "$T"
          cp out/video.mp4 "$T/video.mp4"
          cp out/quality-report.json "$T/quality-report.json"
          cp out/pexels-sources.json "$T/pexels-sources.json"
          cp out/script.txt "$T/script.txt"
          cat > "$T/index.html" <<'HTML'
          <!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TAYVORIQ Review</title></head><body style="background:#07111f;color:white;font-family:Arial;text-align:center;padding:20px"><h1>TAYVORIQ Review</h1><p>✅ Echte Pexels-Szenen · keine Texte im Video · menschlichere Stimme · gesprochener CTA</p><video controls playsinline preload="metadata" style="width:min(92vw,520px);border-radius:18px" src="video.mp4"></video><p><a style="color:#35e69a;font-size:20px" href="video.mp4" download>🎬 Video herunterladen</a></p></body></html>
          HTML
          touch pages/.nojekyll
          cd pages
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tayvoriq .nojekyll
          git commit -m "Publish clean human-voice video ${GITHUB_RUN_ID}"
          git push origin main

      - name: Wait until public links work
        run: |
          set -euo pipefail
          for i in $(seq 1 36); do
            review_code=$(curl -L -s -o /dev/null -w '%{http_code}' "$REVIEW_URL" || true)
            video_code=$(curl -L -s -o /dev/null -w '%{http_code}' "$VIDEO_URL" || true)
            if [ "$review_code" = "200" ] && [ "$video_code" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Send Telegram message with working video link
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          test -n "$TELEGRAM_BOT_TOKEN"
          test -n "$TELEGRAM_CHAT_ID"
          TEXT=$'✅ Neue Fassung fertig\n🎥 5 echte Pexels-Szenen\n🧼 Keine Texte auf den Szenen\n🗣️ Menschlichere deutsche Stimme\n🎯 Sinnvoller gesprochener CTA\n🎬 Review: '"$REVIEW_URL"$'\n📹 Direktes Video: '"$VIDEO_URL"$'\n\n✅ Freigeben oder ❌ Ablehnen'
          curl --fail --silent --show-error \
            --request POST \
            --url "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "disable_web_page_preview=false"

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: tayvoriq-video-${{ github.run_id }}
          path: out/
          retention-days: 7
