name: TAYVORIQ Stop Fix Restart 20260717

on:
  push:
    paths:
      - .github/workflows/tayvoriq-stop-fix-restart-20260717.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  stop-fix-restart:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Cancel active Golden Path runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --repo "$GITHUB_REPOSITORY" --workflow tayvoriq-golden-path.yml --status in_progress --json databaseId --jq '.[].databaseId' | while read -r run_id; do
            [ -z "$run_id" ] || gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done
          gh run list --repo "$GITHUB_REPOSITORY" --workflow tayvoriq-golden-path.yml --status queued --json databaseId --jq '.[].databaseId' | while read -r run_id; do
            [ -z "$run_id" ] || gh run cancel "$run_id" --repo "$GITHUB_REPOSITORY" || true
          done

      - name: Start reliable full production
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-golden-path.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f mode=full \
            -f trend_scope=technology_ai \
            -f topic="Warum KI-Assistenten unseren digitalen Alltag grundlegend verändern"
          sleep 8
          gh run list --repo "$GITHUB_REPOSITORY" --workflow tayvoriq-golden-path.yml --limit 3

