name: Project Lumen 13.1.20 Channel Adapter Fix Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - '.github/workflows/lumen-resilient-final.yml'
      - 'lumen-public-preview/**'

permissions:
  contents: read

concurrency:
  group: project-lumen-13-1-20-channel-adapter-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore Project Lumen through v13.1.15
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview
          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          echo 'c3edf3920f500f707dab2c0d6370f028e2c5d1aabc823ea14451606c377c948a  /tmp/diagnostics.py' | sha256sum -c -
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview

      - name: Correct and apply resilient download patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lumen-public-preview/apply-resilient-download-fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'download_block + "    private static URL buildBrokenHttpsRedirectRecoveryUrl("',
              'download_block')
          text = text.replace(
              'share_block + "    private void clearDiagnosticLog() {"',
              'share_block')
          text = text.replace(
              "        '''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"",
              "        r'''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"")
          text = text.replace(
              "        '''            showDiagnostic(\n                    partialRecovery ?",
              "        r'''            showDiagnostic(\n                    partialRecovery ?")
          text = text.replace(
              "        '''                showDiagnostic(\"Senderliste bereit\"",
              "        r'''                showDiagnostic(\"Senderliste bereit\"")
          text = text.replace(
              "        '''                showDiagnostic(partialRecovery ?",
              "        r'''                showDiagnostic(partialRecovery ?")
          path.write_text(text, encoding='utf-8')
          PY
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview

      - name: Apply HTTP 451 compatibility recovery
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-http451-recovery-fix.py project-lumen-preview

      - name: Apply same-provider Xtream API recovery
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-xtream-api-recovery-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-xtream-compile-fix.py project-lumen-preview

      - name: Apply account-status diagnosis
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-account-status-fix.py project-lumen-preview

      - name: Apply ChannelAdapter crash fix
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-channel-adapter-crash-fix.py project-lumen-preview

      - name: Verify v13.1.20 safety gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          grep -q 'text("v13.1.20"' "$MAIN"
          grep -q 'READ_TIMEOUT_MS = 45_000' "$MAIN"
          grep -q 'setRequestProperty("Range"' "$MAIN"
          grep -q 'status == 206' "$MAIN"
          grep -q 'bestPartial' "$MAIN"
          grep -q 'IMPORT-PARTIAL-RECOVERY' "$MAIN"
          grep -q 'IMPORT-PROTOCOL-RECOVERY' "$MAIN"
          grep -q 'status == 451' "$MAIN"
          grep -q 'IMPORT-HTTP-451-RECOVERY' "$MAIN"
          grep -q 'tryXtreamApiRecovery(current, target, connectTimeout)' "$MAIN"
          grep -q 'player_api.php' "$MAIN"
          grep -q 'action=get_live_streams' "$MAIN"
          grep -q 'action=get_vod_streams' "$MAIN"
          grep -q 'android.util.JsonReader' "$MAIN"
          grep -q 'IMPORT-XTREAM-OK' "$MAIN"
          grep -q 'IMPORT-XTREAM-BLOCKED' "$MAIN"
          grep -q 'IMPORT-SUBSCRIPTION-EXPIRED' "$MAIN"
          grep -q 'IMPORT-ACCOUNT-INACTIVE' "$MAIN"
          grep -q 'class ChannelAdapter' "$MAIN"
          grep -q 'android.R.layout.simple_list_item_2, android.R.id.text1' "$MAIN"
          grep -q 'ProjectLumen/13.1.20 Android' "$MAIN"
          grep -q 'Integer.toHexString(blockedPlaylistUrl.getHost()' "$MAIN"
          if grep -q 'shortHash(blockedPlaylistUrl.getHost())' "$MAIN"; then
            echo 'Unresolved host-id helper detected' >&2
            exit 1
          fi
          if grep -q 'Proxy(' "$MAIN"; then
            echo 'Unexpected proxy bypass code detected' >&2
            exit 1
          fi
          if grep -q 'HostnameVerifier' "$MAIN"; then
            echo 'Unexpected TLS verifier bypass detected' >&2
            exit 1
          fi
          grep -q 'versionCode 133000' project-lumen-preview/app/build.gradle
          grep -q "versionName '13.1.20-channel-adapter-fix-preview'" project-lumen-preview/app/build.gradle

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Android APK
        working-directory: project-lumen-preview
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleDebug 2>&1 | tee ../android-build-13.1.20.log

      - name: Prepare release and diagnostic files
        if: always()
        shell: bash
        run: |
          set -u
          mkdir -p dist
          if [ -f project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.20_Channel_Adapter_Fix.apk
            sha256sum dist/Project_Lumen_13.1.20_Channel_Adapter_Fix.apk > dist/Project_Lumen_13.1.20_Channel_Adapter_Fix.sha256
          fi
          [ -f project-lumen-preview/README.md ] && cp project-lumen-preview/README.md dist/README.md || true
          [ -f android-build-13.1.20.log ] && cp android-build-13.1.20.log dist/android-build-13.1.20.log || true
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.20 Channel Adapter Crash Fix

          Root cause from log MRXXAVHC:
          - the HTTP source is now reachable and returns HTTP 200
          - the complete 81,625,800-byte playlist downloads successfully
          - all 100,000 entries are parsed successfully
          - the main thread crashes only when ListView asks ChannelAdapter for its first row
          - the three-argument ArrayAdapter constructor treats simple_list_item_2 itself as a TextView
          - that layout is actually a TwoLineListItem container, causing ClassCastException

          Correction:
          - bind ArrayAdapter explicitly to android.R.id.text1 inside simple_list_item_2
          - retain the existing two-line channel/group row design and ChannelAdapter.getView logic
          - keep 200-entry paging so the 100,000-entry library remains responsive
          - preserve all download, HTTP 451, Xtream, account-status, encryption and diagnostic fixes
          EOF

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-lumen-13-1-20-channel-adapter-fix
          path: dist/
          if-no-files-found: error
          retention-days: 30
