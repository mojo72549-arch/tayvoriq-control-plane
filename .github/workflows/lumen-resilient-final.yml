name: Project Lumen 13.1.18 Source API Recovery Build

on:
  pull_request:
    branches: [ lumen-build-base-13-1-9 ]
    paths:
      - '.github/workflows/lumen-resilient-final.yml'
      - 'lumen-public-preview/**'

permissions:
  contents: read

concurrency:
  group: project-lumen-13-1-18-source-api-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-final:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Restore Project Lumen through v13.1.15
        shell: bash
        run: |
          set -euo pipefail
          cat lumen-public-preview/source.part*.b64 > /tmp/source.b64
          base64 -d /tmp/source.b64 > /tmp/source.tar.gz
          echo 'aa80a6708425dae0f5e93f8dd7d172895978f779fbf77aba9533a66141b1b28b  /tmp/source.tar.gz' | sha256sum -c -
          tar -xzf /tmp/source.tar.gz

          cat lumen-public-preview/patch-13.1.9.part*.b64 > /tmp/patch.b64
          base64 -d /tmp/patch.b64 > /tmp/patch.tar.gz
          echo 'fe9380cd06760fa19e8d4bfeb1d7ee85d6752cf43e14e97e923d6cbc63d56106  /tmp/patch.tar.gz' | sha256sum -c -
          tar -xzf /tmp/patch.tar.gz

          sed -i 's/text("v13.1.8"/text("v13.1.9"/' project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          python3 lumen-public-preview/apply-tls-fix.py project-lumen-preview
          sed -i "s/applicationId 'com.projectlumen.publicpreview'/applicationId 'com.projectlumen.publicpreview.tlsrecovery'/" project-lumen-preview/app/build.gradle
          python3 lumen-public-preview/apply-list-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-nonstandard-port-fix.py project-lumen-preview
          cat lumen-public-preview/diagnostics-log.part*.b64 > /tmp/diagnostics.b64
          base64 -d /tmp/diagnostics.b64 > /tmp/diagnostics.py
          echo 'c3edf3920f500f707dab2c0d6370f028e2c5d1aabc823ea14451606c377c948a  /tmp/diagnostics.py' | sha256sum -c -
          python3 /tmp/diagnostics.py project-lumen-preview
          python3 lumen-public-preview/apply-diagnostics-compile-fix.py project-lumen-preview
          python3 lumen-public-preview/apply-log-share-text-fix.py project-lumen-preview

      - name: Correct and apply resilient download patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lumen-public-preview/apply-resilient-download-fix.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'download_block + "    private static URL buildBrokenHttpsRedirectRecoveryUrl("',
              'download_block')
          text = text.replace(
              'share_block + "    private void clearDiagnosticLog() {"',
              'share_block')
          text = text.replace(
              "        '''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"",
              "        r'''            showDiagnostic(\n                    \"Senderliste ist sichtbar\"")
          text = text.replace(
              "        '''            showDiagnostic(\n                    partialRecovery ?",
              "        r'''            showDiagnostic(\n                    partialRecovery ?")
          text = text.replace(
              "        '''                showDiagnostic(\"Senderliste bereit\"",
              "        r'''                showDiagnostic(\"Senderliste bereit\"")
          text = text.replace(
              "        '''                showDiagnostic(partialRecovery ?",
              "        r'''                showDiagnostic(partialRecovery ?")
          path.write_text(text, encoding='utf-8')
          PY
          python3 lumen-public-preview/apply-resilient-download-fix.py project-lumen-preview

      - name: Apply HTTP 451 compatibility recovery
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-http451-recovery-fix.py project-lumen-preview

      - name: Apply same-origin Source API recovery
        shell: bash
        run: |
          set -euo pipefail
          python3 lumen-public-preview/apply-xtream-source-api-recovery-fix.py project-lumen-preview

      - name: Verify v13.1.18 safety and recovery gates
        shell: bash
        run: |
          set -euo pipefail
          MAIN=project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
          grep -q 'text("v13.1.18"' "$MAIN"
          grep -q 'READ_TIMEOUT_MS = 45_000' "$MAIN"
          grep -q 'setRequestProperty("Range"' "$MAIN"
          grep -q 'status == 206' "$MAIN"
          grep -q 'bestPartial' "$MAIN"
          grep -q 'IMPORT-PARTIAL-RECOVERY' "$MAIN"
          grep -q 'IMPORT-PROTOCOL-RECOVERY' "$MAIN"
          grep -q 'IMPORT-HTTP-451-RECOVERY' "$MAIN"
          grep -q 'tryXtreamSourceApiRecovery' "$MAIN"
          grep -q 'player_api.php' "$MAIN"
          grep -q 'get_live_categories' "$MAIN"
          grep -q 'get_live_streams' "$MAIN"
          grep -q 'IMPORT-XTREAM-API-OK' "$MAIN"
          grep -q 'JsonReader' "$MAIN"
          grep -q 'writer.write("#EXTM3U\\n")' "$MAIN"
          grep -q 'versionCode 132800' project-lumen-preview/app/build.gradle
          grep -q "versionName '13.1.18-source-api-recovery-preview'" project-lumen-preview/app/build.gradle
          if grep -q 'Proxy(' "$MAIN"; then
            echo 'Unexpected proxy bypass code detected' >&2
            exit 1
          fi
          if grep -q 'HostnameVerifier' "$MAIN"; then
            echo 'Unexpected TLS verifier bypass detected' >&2
            exit 1
          fi
          if grep -q 'setHostnameVerifier' "$MAIN"; then
            echo 'Unexpected hostname verification bypass detected' >&2
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" >/dev/null

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build Android APK
        working-directory: project-lumen-preview
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon clean assembleDebug 2>&1 | tee ../android-build-13.1.18.log

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp project-lumen-preview/app/build/outputs/apk/debug/app-debug.apk dist/Project_Lumen_13.1.18_Source_API_Recovery.apk
          cp project-lumen-preview/README.md dist/README.md
          cp android-build-13.1.18.log dist/android-build-13.1.18.log
          cat > dist/PATCH_NOTES.txt <<'EOF'
          Project Lumen 13.1.18 Same-Origin Source API Recovery

          Root cause from smartphone log MRXI7SGL on 2026-07-23:
          - guarded HTTPS-to-HTTP recovery succeeds
          - the reached server identifies itself as CDN PROXY SERVICE
          - get.php returns HTTP 451 for both the VLC profile and the Android browser profile
          - zero playlist bytes are returned

          Recovery:
          - keep the existing get.php path as the primary import
          - after confirmed HTTP 451, detect standard username/password query fields locally
          - call player_api.php on the exact same scheme, host, port and path root
          - retrieve live categories and live streams through the neutral Source API adapter
          - parse large JSON arrays as a stream instead of loading them fully into memory
          - generate the temporary M3U locally on the device
          - construct stream URLs only for the same source origin
          - keep credentials and complete URLs out of diagnostics
          - no proxy, VPN, direct-IP substitution, hostname-verifier bypass or external server
          - if player_api.php is also blocked, retain the clear IMPORT-ACCESS-DENIED result
          EOF
          sha256sum dist/Project_Lumen_13.1.18_Source_API_Recovery.apk > dist/Project_Lumen_13.1.18_Source_API_Recovery.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-18-source-api-recovery
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Preserve generated source on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: project-lumen-13-1-18-build-debug
          path: |
            project-lumen-preview/app/src/main/java/com/projectlumen/publicpreview/MainActivity.java
            project-lumen-preview/app/build.gradle
            android-build-13.1.18.log
          if-no-files-found: warn
          retention-days: 7
