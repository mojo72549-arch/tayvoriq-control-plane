name: Trigger TAYVORIQ Full Production Now

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/run-now/tayvoriq-full.txt
      - .github/workflows/tayvoriq-trigger-full-now.yml

permissions:
  actions: write
  contents: write

concurrency:
  group: tayvoriq-full-production-trigger
  cancel-in-progress: true

jobs:
  dispatch-full-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout control plane
        uses: actions/checkout@v4

      - name: Validate Telegram target silently
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ.get("TELEGRAM_BOT_TOKEN", "").strip()
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "").strip()
          if not token or not chat_id:
              raise SystemExit("Telegram delivery blocked: TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is missing")

          def telegram(method, payload):
              url = f"https://api.telegram.org/bot{token}/{method}"
              request = urllib.request.Request(
                  url,
                  data=urllib.parse.urlencode(payload).encode("utf-8"),
                  method="POST",
              )
              try:
                  with urllib.request.urlopen(request, timeout=25) as response:
                      body = response.read().decode("utf-8", errors="replace")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  raise RuntimeError(f"Telegram HTTP {exc.code}: {body[:500]}") from exc
              data = json.loads(body or "{}")
              if not data.get("ok"):
                  safe = {key: data.get(key) for key in ("ok", "error_code", "description")}
                  raise RuntimeError("Telegram API rejected request: " + json.dumps(safe, ensure_ascii=False))
              return data.get("result") or {}

          bot = telegram("getMe", {})
          chat = telegram("getChat", {"chat_id": chat_id})
          print(json.dumps({
              "telegram_probe": "validated_without_message",
              "bot_username": bot.get("username"),
              "chat_id": str(chat.get("id") or ""),
              "user_visible_message_sent": False,
          }, ensure_ascii=False))
          PY

      - name: Trigger full Golden Path from latest main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-golden-path.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f mode=full \
            -f trend_scope=auto_scope \
            -f topic=""
          echo "V27 quality-first shared-master production was dispatched from latest main."

      - name: Persist dispatched run evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p .github/run-now
          for attempt in 1 2 3 4 5 6; do
            sleep 5
            gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow tayvoriq-golden-path.yml \
              --limit 1 \
              --json databaseId,status,conclusion,url,createdAt,headSha,event \
              --jq '.[0]' > .github/run-now/latest-tayvoriq-run.json
            if grep -q '"databaseId"' .github/run-now/latest-tayvoriq-run.json; then
              break
            fi
          done
          cat .github/run-now/latest-tayvoriq-run.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/run-now/latest-tayvoriq-run.json
          if ! git diff --cached --quiet; then
            git commit -m "ops: record latest TAYVORIQ production run"
            git push origin main
          fi

