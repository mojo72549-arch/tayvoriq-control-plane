name: Trigger TAYVORIQ Full Production Now

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/tayvoriq-trigger-full-now.yml

permissions:
  actions: write
  contents: read

jobs:
  dispatch-full-production:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger full Golden Path
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run tayvoriq-golden-path.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f mode=full \
            -f trend_scope=auto_scope \
            -f topic=""
          echo "Full TAYVORIQ production was dispatched."

